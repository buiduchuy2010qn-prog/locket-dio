services:
  - type: web
    name: locket-dio
    runtime: node
    plan: free
    # Prebuilt SPA in public/ + CORS proxy (server.mjs) — no npm build on Render
    buildCommand: echo "Using prebuilt public/ + server.mjs proxy"
    startCommand: node server.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
