services:
  - type: web
    name: locket-dio
    runtime: static
    buildCommand: "(npm install && npm run build && node scripts/prepare-static.mjs) || echo 'Using prebuilt public/'"
    staticPublishPath: ./public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
