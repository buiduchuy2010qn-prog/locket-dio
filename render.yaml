# Static frontend (matches existing locket-dio Static Site on Render)
# For full API + Postgres, add a separate Web Service later.

services:
  - type: web
    name: locket-dio
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
