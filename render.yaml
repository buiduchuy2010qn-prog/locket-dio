# Blueprint Render — Web + API (auto khi sync Blueprint)
services:
  # ── WEB: SPA + Drive + proxy ─────────────────────────────────
  - type: web
    name: huy-locket
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Trỏ proxy /dio-api → service API (Render inject URL)
      - key: LOCKET_API_UPSTREAM
        fromService:
          name: huy-locket-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      # Neon — OAuth Drive (không commit key mới; giữ env đã set trên dashboard nếu đổi)
      - key: DATABASE_URL
        sync: false

  # ── API: backend Huy Locket (folder /api) ─────────────────────
  - type: web
    name: huy-locket-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECRET
        generateValue: true
      - key: LOCKETDIO_JWT_SECRET
        generateValue: true
      - key: LOCKETDIO_SIGNATURE_SECRET
        generateValue: true
      # Domain web được CORS
      - key: CORS_ORIGINS
        value: https://huy-locket.onrender.com
      # Locket Firebase public API key (login Identity Toolkit) — override trên Dashboard nếu cần
      - key: FIREBASE_API_KEY
        value: AIzaSyCQngaaXQIfJaH0aS2l7REgIjD7nL431So
      # Supabase optional: membership DB. Không set → gói Free local, login vẫn OK
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, WEATHER_API_KEY
