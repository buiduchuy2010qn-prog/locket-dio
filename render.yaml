services:
  - type: web
    name: locket-dio
    runtime: static
    buildCommand: cd apps/web && npm install && npm run build && cd ../.. && node scripts/copy-web-dist.mjs
    staticPublishPath: ./public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
