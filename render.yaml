services:
  - type: web
    name: locket-dio
    runtime: static
    # Prebuilt SPA is committed under public/ — do not run npm on Render
    # (npm build fails on Render free static; public/ already has production files)
    buildCommand: echo "Deploying prebuilt Client-Locket-Dio from public/"
    staticPublishPath: ./public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
