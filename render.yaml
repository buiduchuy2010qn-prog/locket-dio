services:
  - type: web
    name: locket-dio
    runtime: static
    # Install ONLY frontend (avoid apps/api native deps like sharp on static builders)
    buildCommand: cd apps/web && npm install && npm run build && cd ../.. && node scripts/copy-web-dist.mjs
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
