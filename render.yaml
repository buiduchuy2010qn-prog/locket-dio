services:
  # MUST be Web Service (Docker) — Static Site cannot proxy API (CORS login fails)
  - type: web
    name: locket-camera-huy-2026
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /dio-api/
    envVars:
      - key: NODE_ENV
        value: production
