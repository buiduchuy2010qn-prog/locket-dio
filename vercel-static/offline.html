<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Huy Locket — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f0f12;
        color: #f5f5f7;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        opacity: 0.8;
        line-height: 1.5;
        margin: 0 0 16px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: #ffb800;
        color: #111;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Đang ngoại tuyến</h1>
      <p>
        Không tải được phiên bản mới. Thử mở lại khi có mạng — bản nháp vẫn được
        lưu trên thiết bị.
      </p>
      <button type="button" onclick="location.reload()">Thử lại</button>
    </div>
  </body>
</html>
