services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: locket
      POSTGRES_PASSWORD: locket
      POSTGRES_DB: locket_dio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locket -d locket_dio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://locket:locket@db:5432/locket_dio?schema=public
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173,http://localhost
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  # Optional reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - api
  #     - web

volumes:
  pgdata:
  uploads:
