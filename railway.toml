# Huy Locket Web — Railway
#
# Service huy-locket (web):
#   Root Directory: . (hoặc trống)
#   Dockerfile: Dockerfile
#   Variables BẮT BUỘC:
#     LOCKET_API_UPSTREAM=https://huy-locket-api-production.up.railway.app
#
# Service huy-locket-api:
#   Root Directory: api
#   Dockerfile: Dockerfile
#   Variables:
#     CORS_ORIGINS=https://huy-locket-production.up.railway.app
#     LOCKETDIO_SIGNATURE_SECRET=<chuỗi dài cố định — đừng Generate mỗi lần>
#     LOCKETDIO_JWT_SECRET=<cố định>
#     COOKIE_SECRET=<cố định>
#     SPOTIFY_CLIENT_ID / SPOTIFY_CLIENT_SECRET
#     FIREBASE_API_KEY=AIzaSyCQngaaXQIfJaH0aS2l7REgIjD7nL431So

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  healthcheckPath = "/"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
